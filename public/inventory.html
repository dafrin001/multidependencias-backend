<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Inventario y Activos Fijos</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-body: #0f111a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 3rem; animation: fadeInDown 0.8s ease-out; }
        .header h1 {
            font-size: 2.5rem; font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
        }
        .header p { color: var(--text-muted); font-size: 1.1rem; }

        .dashboard-container {
            width: 100%; max-width: 1200px;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: fadeInUp 0.8s ease-out;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        
        .search-box { position: relative; flex-grow: 1; max-width: 400px; }
        .search-box input {
            width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem;
            background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); border-radius: 10px;
            color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.3s ease;
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .search-box svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: var(--text-muted); }

        .actions { display: flex; gap: 1rem; }
        .btn {
            background: var(--primary); color: white; border: none; padding: 0.8rem 1.5rem;
            border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }

        .loader { display: flex; justify-content: center; padding: 4rem 0; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; display: none; }

        .asset-card {
            background: rgba(15, 23, 42, 0.4); border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 1.5rem; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .asset-card:hover {
            transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); background: rgba(15, 23, 42, 0.7);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .tag-status { font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .status-asset { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }

        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.4; color: var(--primary); }

        .card-details { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1rem; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 500; color: #e2e8f0; }

        .card-actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.8rem; }

        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal {
            background: #1e293b; border: 1px solid var(--glass-border); border-radius: 15px; width: 100%; max-width: 500px; padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.5rem; font-weight: 600; }
        .close-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%; padding: 0.8rem; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border);
            border-radius: 8px; color: var(--text-main); font-size: 1rem;
        }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .empty-state { display: none; text-align: center; padding: 3rem 0; color: var(--text-muted); }

        /* Diseño Responsivo / Mobile-Friendly */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header h1 { font-size: 1.8rem; }
            .header p { font-size: 0.95rem; }
            .dashboard-container { padding: 1rem; border-radius: 15px; }
            .controls { flex-direction: column; align-items: stretch; gap: 1rem; margin-bottom: 1.5rem; }
            .search-box { max-width: 100%; width: 100%; }
            .actions { flex-direction: column; width: 100%; }
            .actions .btn { width: 100%; margin-bottom: 0.5rem; }
            .inventory-grid { grid-template-columns: 1fr; gap: 1rem; }
            .modal { width: 95%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
            .form-actions { flex-direction: column-reverse; gap: 0.5rem; }
            .form-actions button { width: 100%; }
            .card-actions { flex-wrap: wrap; }
            .card-actions button { flex-grow: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sistema de Gestión de Inventario</h1>
        <p>Centro de Control - Activos Fijos (CRUD Activo)</p>
    </div>

    <div class="dashboard-container">
        
        <div class="controls">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar por código...">
            </div>
            <div class="actions">
                <button class="btn" onclick="openModal()">+ Nuevo Activo</button>
                <button class="btn" id="refreshBtn" onclick="fetchData()">Actualizar</button>
            </div>
        </div>

        <div class="loader" id="loader"><div class="spinner"></div></div>
        <div class="inventory-grid" id="inventoryGrid"></div>
        <div class="empty-state" id="emptyState"><p>No se encontraron registros en el inventario.</p></div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="assetModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Crear Activo Fijo</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="assetForm" onsubmit="saveAsset(event)">
                <input type="hidden" id="assetId">
                
                <div class="form-group">
                    <label>Código de Inventario</label>
                    <input type="text" id="invCode" required>
                </div>
                <div class="form-group">
                    <label>Artículo Base</label>
                    <select id="itemSelect" required><option value="">Cargando...</option></select>
                </div>
                <div class="form-group">
                    <label>Proveedor</label>
                    <select id="providerSelect" required><option value="">Cargando...</option></select>
                </div>
                <div class="form-group">
                    <label>Número de Serie</label>
                    <input type="text" id="serialNum">
                </div>
                <div class="form-group">
                    <label>Precio Compra</label>
                    <input type="number" step="0.01" id="price">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="statusSelect" required>
                        <option value="nuevo">Nuevo</option>
                        <option value="bueno">Bueno</option>
                        <option value="regular">Regular</option>
                        <option value="malo">Malo</option>
                        <option value="baja">De Baja</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let assetsData = [];
        let itemsList = [];
        let providersList = [];

        async function fetchData() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('inventoryGrid');
            const emptyState = document.getElementById('emptyState');
            loader.style.display = 'flex'; grid.style.display = 'none'; emptyState.style.display = 'none';

            try {
                // Fetch assets
                let res = await fetch('/api/fixed-assets');
                let json = await res.json();
                assetsData = json.data;

                // Fetch references for dropdowns (only once if possible, but fine here)
                if(itemsList.length === 0) {
                    let resItems = await fetch('/api/inventory');
                    let jsonItems = await resItems.json();
                    itemsList = jsonItems.data;

                    let resProv = await fetch('/api/providers');
                    let jsonProv = await resProv.json();
                    providersList = jsonProv.data;
                }

                renderGrid(assetsData);
            } catch (error) {
                console.error(error);
                emptyState.innerHTML = "<p style='color: #ef4444;'>Error de conexión con el servidor API.</p>";
                emptyState.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderGrid(assets) {
            const grid = document.getElementById('inventoryGrid');
            const emptyState = document.getElementById('emptyState');
            grid.innerHTML = '';

            if (assets.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';

            assets.forEach((asset, index) => {
                const itemData = asset.item || {};
                const provData = asset.provider || {};
                
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.style.animation = `fadeInUp 0.5s ease-out ${index * 0.1}s both`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="tag-status status-asset">${asset.status}</span>
                    </div>
                    <div class="card-title">${asset.inventory_code}</div>
                    
                    <div class="card-details">
                        <div class="detail-row">
                            <span class="detail-label">Artículo</span>
                            <span class="detail-value">${itemData.name || 'Desconocido'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">N/S</span>
                            <span class="detail-value">${asset.serial_number || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Proveedor</span>
                            <span class="detail-value">${provData.company_name || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-small" onclick='editAsset(${JSON.stringify(asset)})'>Editar</button>
                        <button class="btn btn-small btn-danger" onclick='deleteAsset(${asset.id})'>Eliminar</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function populateSelects() {
            const itemSelect = document.getElementById('itemSelect');
            itemSelect.innerHTML = itemsList.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            
            const provSelect = document.getElementById('providerSelect');
            provSelect.innerHTML = providersList.map(p => `<option value="${p.id}">${p.company_name}</option>`).join('');
        }

        function openModal() {
            document.getElementById('modalTitle').innerText = 'Crear Activo Fijo';
            document.getElementById('assetForm').reset();
            document.getElementById('assetId').value = '';
            populateSelects();
            document.getElementById('assetModal').style.display = 'flex';
        }

        function editAsset(asset) {
            document.getElementById('modalTitle').innerText = 'Editar Activo Fijo';
            populateSelects();
            document.getElementById('assetId').value = asset.id;
            document.getElementById('invCode').value = asset.inventory_code;
            document.getElementById('itemSelect').value = asset.item_id;
            document.getElementById('providerSelect').value = asset.provider_id;
            document.getElementById('serialNum').value = asset.serial_number || '';
            document.getElementById('price').value = asset.purchase_price || '';
            document.getElementById('statusSelect').value = asset.status;
            
            document.getElementById('assetModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('assetModal').style.display = 'none';
        }

        async function saveAsset(e) {
            e.preventDefault();
            const id = document.getElementById('assetId').value;
            const payload = {
                inventory_code: document.getElementById('invCode').value,
                item_id: document.getElementById('itemSelect').value,
                provider_id: document.getElementById('providerSelect').value,
                serial_number: document.getElementById('serialNum').value,
                purchase_price: document.getElementById('price').value,
                status: document.getElementById('statusSelect').value,
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? '/api/fixed-assets/' + id : '/api/fixed-assets';

            try {
                let res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    closeModal();
                    fetchData();
                } else {
                    let err = await res.json();
                    alert("Error: " + (err.message || "Verifique los datos."));
                }
            } catch (err) { alert("Error de red"); }
        }

        async function deleteAsset(id) {
            if(!confirm("¿Estás seguro de eliminar este activo?")) return;
            try {
                let res = await fetch('/api/fixed-assets/' + id, { method: 'DELETE', headers:{'Accept':'application/json'} });
                if(res.ok) fetchData();
                else alert("Error eliminando activo.");
            } catch(e) { alert("Error de red"); }
        }

        // Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = assetsData.filter(asset => 
                asset.inventory_code.toLowerCase().includes(term) ||
                (asset.item && asset.item.name.toLowerCase().includes(term))
            );
            renderGrid(filtered);
        });

        window.onload = fetchData;
    </script>
</body>
</html>
